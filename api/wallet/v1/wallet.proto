syntax = "proto3";

package vn.vato.zora.be.api.wallet.v1;

import "google/api/annotations.proto";

option go_package = "vn.vato.zora.be.api/api/wallet/v1;v1";
option java_multiple_files = true;
option java_outer_classname = "HelloworldProtoV1";

// The wallet service definition.
service WalletService {
  rpc GetBalance(BalanceRequest) returns (BalanceReply);

  rpc Transfer (BalanceRequest) returns (BalanceReply);
}

message BalanceRequest {
  int64 user_id = 1;
}

message BalanceReply {
  int64 balance_zatify_id = 1;
  int64 balance_zatify = 2;

  int64 balance_zns_id = 3;
  int64 balance_zns = 4;
}